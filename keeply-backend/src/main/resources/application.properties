# Nombre de la aplicación en el contexto de Spring Boot
spring.application.name=keeply

# ==========================================
# 1. Configuración del Servidor
# ==========================================
# El puerto donde se levantará la aplicación. 
# Utiliza la variable de entorno 'PORT' (inyectada por Railway en producción).
# Si no existe (en entorno de desarrollo local), utilizará el puerto 8080 por defecto.
server.port=${PORT:8080}

# ==========================================
# 2. Conexión a la Base de Datos (Híbrida: Producción / Local)
# ==========================================
# URL de conexión a MySQL. Utiliza variables de entorno para producción, 
# con valores por defecto (localhost, 3307, keeply_db) para el desarrollo local.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:keeply_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Usuario de la base de datos
spring.datasource.username=${MYSQLUSER:root}
# Contraseña de la base de datos
spring.datasource.password=${MYSQLPASSWORD:root}
# Driver oficial de MySQL para la conexión JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. Configuración de JPA (Java Persistence API) e Hibernate
# ==========================================
# 'update': Actualiza el esquema de la base de datos automáticamente si hay cambios en las entidades.
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola las sentencias SQL generadas por Hibernate (útil para depuración).
spring.jpa.show-sql=true
# Dialecto específico de MySQL para que Hibernate genere las consultas SQL óptimas.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 4. Configuración de Seguridad y JWT (JSON Web Token)
# ==========================================
# Clave secreta utilizada para firmar los tokens JWT. Debe ser larga y segura para evitar falsificaciones.
jwt.secret=MiClaveSecretaParaKeeplyJWTMuyLargaYSegura2026ProyectoTFG
# Tiempo de expiración del token en milisegundos (86400000 ms = 24 horas).
jwt.expiration=86400000

# ==========================================
# 5. Claves de APIs Externas (Integración de datos)
# ==========================================
# API de The Movie Database (TMDB) para películas y series
api.tmdb.key=4da0b85272e93bad0f8ebc6c66adf077

# API de Jikan (MyAnimeList) para anime y manga
# (Actualmente funciona de forma pública, pero se puede añadir key si es necesario)
api.jikan.key=

# API de RAWG para la base de datos de videojuegos
api.rawg.key=17750cffeece4d9caf24cb0d78f41c5f

# API de Google Books para la búsqueda de libros y cómics
api.google.books.key=AIzaSyC47MtFrXUeQ54brFJK4Yd5UqvjXGjWLxQ
