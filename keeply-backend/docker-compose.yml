version: '3.8'
services:
  mariadb:
    image: mariadb:10.6
    container_name: keeply-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: keeply_db
      MARIADB_USER: keeply_user
      MARIADB_PASSWORD: keeply_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mariadb_data:
