<div class="busqueda-page">
    <app-navbar></app-navbar>

    <main class="busqueda-container">
        <div class="busqueda-header">
            <h2>{{ 'SEARCH.TITLE' | translate }}</h2>
            <button class="btn-volver" (click)="volverABiblioteca()">{{ 'SEARCH.BACK_LIBRARY' | translate }}</button>
        </div>

        <div class="busqueda-form">
            <input type="text" [(ngModel)]="query" [placeholder]="'SEARCH.PLACEHOLDER' | translate" (keyup.enter)="buscar()">
            <select [(ngModel)]="tipoSeleccionado">
                <option *ngFor="let tipo of tipos" [value]="tipo.valor">{{ tipo.label }}</option>
            </select>
            <button class="btn btn-primary" (click)="buscar()" [disabled]="cargando">
                {{ cargando ? ('SEARCH.SEARCHING' | translate) : ('SEARCH.SEARCH_BTN' | translate) }}
            </button>
        </div>

        <p class="mensaje" *ngIf="mensaje">{{ mensaje }}</p>

        <div class="resultados-grid">
            <div class="resultado-card" *ngFor="let resultado of resultados">
                <div class="card-img-wrapper">
                    <img *ngIf="resultado.imagenUrl" [src]="resultado.imagenUrl" [alt]="resultado.titulo">
                    <div class="no-image" *ngIf="!resultado.imagenUrl">{{ 'SEARCH.NO_IMAGE' | translate }}</div>
                </div>
                <div class="card-info">
                    <h3>{{ resultado.titulo }}</h3>
                    <p class="tipo-badge">{{ resultado.tipoObra }}</p>
                    <p class="fecha" *ngIf="resultado.fechaLanzamiento">{{ resultado.fechaLanzamiento }}</p>
                    <p class="descripcion" *ngIf="resultado.descripcion">{{ resultado.descripcion | slice:0:120 }}...</p>

                    <button *ngIf="!estaEnBiblioteca(resultado)"
                            class="btn btn-secondary"
                            (click)="agregarABiblioteca(resultado)"
                            [disabled]="estaAgregando(resultado)">
                        {{ estaAgregando(resultado) ? ('SEARCH.ADDING' | translate) : ('SEARCH.ADD_TO_LIBRARY' | translate) }}
                    </button>
                    <button *ngIf="estaEnBiblioteca(resultado)"
                            class="btn btn-added"
                            disabled>
                        {{ 'SEARCH.ALREADY_IN_LIBRARY' | translate }}
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
