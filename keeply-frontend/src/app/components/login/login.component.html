<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
            <label for="nombreUsuario">Nombre de usuario</label>
            <input id="nombreUsuario" type="text" [(ngModel)]="nombreUsuario" name="nombreUsuario" required placeholder="Tu nombre de usuario">
        </div>

        <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input id="contrasena" type="password" [(ngModel)]="contrasena" name="contrasena" required
                placeholder="Tu contraseña">
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="loading">
            @if (loading) {
                Entrando...
            } @else {
                Entrar
            }
        </button>
    </form>

    <div class="divider">
        <span>o</span>
    </div>

    <div class="google-btn-wrapper">
        <div #googleBtn id="google-signin-btn"></div>
    </div>

    @if (error) {
    <p class="error-msg">{{ error }}</p>
    }

    <p class="register-link">¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
</div>
