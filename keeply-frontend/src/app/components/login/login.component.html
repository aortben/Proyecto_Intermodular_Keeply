<div class="auth-page">
    <app-navbar></app-navbar>

    <main class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <h1 class="auth-title">{{ 'LOGIN.TITLE' | translate }}</h1>
                <p class="auth-subtitle">{{ 'LOGIN.SUBTITLE' | translate }}</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="username">{{ 'NAVBAR.USERNAME' | translate }}</label>
                    <input id="username" type="text" [(ngModel)]="nombreUsuario"
                           [placeholder]="'NAVBAR.USERNAME' | translate" (keyup.enter)="login()">
                </div>
                <div class="input-group">
                    <label for="password">{{ 'NAVBAR.PASSWORD' | translate }}</label>
                    <input id="password" type="password" [(ngModel)]="contrasena"
                           [placeholder]="'NAVBAR.PASSWORD' | translate" (keyup.enter)="login()">
                </div>

                <p class="auth-error" *ngIf="authError" role="alert">{{ authError }}</p>

                <button class="btn-auth-primary" (click)="login()" [disabled]="cargando">
                    {{ cargando ? ('LOGIN.LOADING' | translate) : ('NAVBAR.ENTER' | translate) }}
                </button>

                <div class="auth-divider">
                    <span>{{ 'NAVBAR.OR' | translate }}</span>
                </div>

                <div class="google-btn-wrapper">
                    <div #googleBtnLogin id="google-btn-login-page"></div>
                </div>
            </div>

            <div class="auth-footer">
                <p>{{ 'NAVBAR.NO_ACCOUNT' | translate }}
                    <a routerLink="/registro">{{ 'NAVBAR.SIGN_UP' | translate }}</a>
                </p>
            </div>
        </div>
    </main>
</div>
