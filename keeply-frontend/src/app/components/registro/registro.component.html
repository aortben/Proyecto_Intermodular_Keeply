<div class="registro-container">
    <h2>Registro de Usuario</h2>

    <form (ngSubmit)="registrar()" class="registro-form">
        <div class="form-group">
            <label for="nombreUsuario">Nombre de usuario</label>
            <input id="nombreUsuario" type="text" [(ngModel)]="nombreUsuario" name="nombreUsuario" required
                placeholder="Ej: alvaro123">
        </div>

        <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input id="contrasena" type="password" [(ngModel)]="contrasena" name="contrasena" required
                placeholder="Tu contraseña">
        </div>

        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>

    @if (mensaje) {
    <p class="success-msg">{{ mensaje }}</p>
    }
    @if (error) {
    <p class="error-msg">{{ error }}</p>
    }

    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
</div>
