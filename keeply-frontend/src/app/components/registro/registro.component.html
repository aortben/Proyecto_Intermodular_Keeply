<div class="auth-page">
    <app-navbar></app-navbar>

    <main class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <h1 class="auth-title">{{ 'REGISTER.TITLE' | translate }}</h1>
                <p class="auth-subtitle">{{ 'REGISTER.SUBTITLE' | translate }}</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="reg-username">{{ 'NAVBAR.USERNAME' | translate }}</label>
                    <input id="reg-username" type="text" [(ngModel)]="nombreUsuario"
                        [placeholder]="'NAVBAR.USERNAME' | translate">
                </div>
                <div class="input-group">
                    <label for="reg-email">{{ 'REGISTER.EMAIL_LABEL' | translate }}</label>
                    <input id="reg-email" type="email" [(ngModel)]="email" [placeholder]="'NAVBAR.EMAIL' | translate">
                </div>
                <div class="input-group">
                    <label for="reg-password">{{ 'NAVBAR.PASSWORD' | translate }}</label>
                    <input id="reg-password" type="password" [(ngModel)]="contrasena"
                        [placeholder]="'REGISTER.PASSWORD_PLACEHOLDER' | translate" (keyup.enter)="registrar()">
                </div>

                <!-- Avatar selection -->
                <div class="avatar-selection">
                    <p class="avatar-section-title">{{ 'REGISTER.CHOOSE_AVATAR' | translate }}</p>
                    <div class="avatar-grid">
                        <div *ngFor="let av of avatarOptions" class="avatar-option"
                            [class.selected]="selectedAvatarId === av.id && !customAvatarUrl"
                            (click)="selectAvatar(av)">
                            <img [src]="av.url" alt="Avatar option">
                        </div>
                        <label class="avatar-upload-btn" [class.selected]="selectedAvatarId === 'custom'">
                            {{ subiendoAvatar ? '...' : '+' }}
                            <input type="file" accept="image/jpeg,image/png,image/webp,image/gif"
                                (change)="onAvatarFileSelected($event)" [disabled]="subiendoAvatar">
                        </label>
                    </div>
                    <!-- Preview -->
                    <div class="avatar-preview" *ngIf="customAvatarUrl || getSelectedAvatar()">
                        <div class="preview-circle">
                            <img [src]="getSelectedAvatarUrl()" alt="Avatar">
                        </div>
                    </div>
                </div>

                <p class="auth-error" *ngIf="authError" role="alert">{{ authError }}</p>

                <button class="btn-auth-primary" (click)="registrar()" [disabled]="cargando">
                    {{ cargando ? ('REGISTER.CREATING' | translate) : ('NAVBAR.CREATE_ACCOUNT' | translate) }}
                </button>

                <div class="auth-divider">
                    <span>{{ 'NAVBAR.OR' | translate }}</span>
                </div>

                <div class="google-btn-wrapper">
                    <div #googleBtnRegistro id="google-btn-register-page"></div>
                </div>
            </div>

            <div class="auth-footer">
                <p>{{ 'NAVBAR.HAS_ACCOUNT' | translate }}
                    <a routerLink="/login">{{ 'NAVBAR.SIGN_IN' | translate }}</a>
                </p>
            </div>
        </div>
    </main>
</div>
