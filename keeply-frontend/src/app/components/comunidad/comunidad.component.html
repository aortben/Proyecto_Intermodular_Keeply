<div class="comunidad-page">
    <app-navbar></app-navbar>

    <main class="comunidad-container">
        <div class="comunidad-header">
            <h2>{{ 'COMMUNITY.TITLE' | translate }}</h2>
            <p>{{ 'COMMUNITY.SUBTITLE' | translate }}</p>
        </div>

        <div class="busqueda-form">
            <input type="text" [(ngModel)]="query" [placeholder]="'COMMUNITY.SEARCH_PLACEHOLDER' | translate" (keyup.enter)="buscar()">
            <button class="btn btn-primary" (click)="buscar()" [disabled]="cargando">
                {{ cargando ? ('COMMUNITY.SEARCHING' | translate) : ('COMMUNITY.SEARCH_BTN' | translate) }}
            </button>
        </div>

        <p class="mensaje" *ngIf="mensaje">{{ mensaje | translate }}</p>

        <div class="resultados-grid" *ngIf="resultado">
            <div class="resultado-card user-card" (click)="verPerfil(resultado.nombreUsuario)">
                <div class="card-img-wrapper avatar-wrapper">
                    <img [src]="getUserAvatarUrl(resultado)" alt="Avatar">
                </div>
                <div class="card-info">
                    <h3>{{ resultado.nombreUsuario }}</h3>
                    <p class="tipo-badge">{{ 'COMMUNITY.MEMBER' | translate }}</p>
                    <button class="btn btn-secondary">{{ 'COMMUNITY.VIEW_PROFILE' | translate }}</button>
                </div>
            </div>
        </div>
    </main>
</div>
